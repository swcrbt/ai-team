name: ai_team
description: Local-first Flutter desktop app for multi-model development teams.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^11.0.2
  flutter_markdown_plus: ^1.0.7
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.5
  path: ^1.9.0
  cross_file: ^0.3.5+2
  mime: ^1.0.6
  image: ^4.1.7
  super_clipboard: ^0.8.0
  desktop_drop: ^0.4.4

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
